<!DOCTYPE html>
<html>
<head>
<title>Bee Squish</title>
<style>
        @keyframes wiggle {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            50% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
            100% { transform: rotate(0deg); }
        }

        .squeak-animation {
            animation: wiggle 0.2s ease-in-out;
        }

        #beeImage {
            width: 300px; 
            cursor: pointer; 
            transition: transform 0.1s;
        }
    </style>
</head>
<body>

<div style="text-align: center;">

<h1 style="color:rgb(255,238,140);
background-color:black;
font-size:300%;
display: inline-block; 
padding: 0px 20px;
margin-bottom: 10px"
>
bee &#9829;
</h1>

<div style="text-align: center;">

<p style ="color:white;
background-color:black;
display: inline-block; 
padding: 5px 5px;
margin-top: -175px">
bee appreciation post
</p>

<body style="background-color: rgb(255,238,140);">


<img src="https://pngimg.com/uploads/bee/bee_PNG74690.png" alt="transparent png of a bee" style="display: block; margin-left: auto; margin-right: auto; width: 50%;">

<audio id="beeSound" src="http://googleusercontent.com/file_content/0"></audio>

    <script>
        const bee = document.getElementById('beeImage');
        const sound = document.getElementById('beeSound');

        bee.addEventListener('click', function() {
            sound.currentTime = 0; 
            sound.play();

            bee.classList.add('squeak-animation');

            setTimeout(() => {
                bee.classList.remove('squeak-animation');
            }, 200);
        });
    </script>
    
</body>
</html>
