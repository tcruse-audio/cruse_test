<!DOCTYPE html>
<html>
<head>
<title>Bee Squish</title>
<style>
  
    .wiggle {
        animation: shake 0.2s;
    }
    @keyframes shake {
        0% { transform: scale(1) rotate(0deg); }
        50% { transform: scale(0.9) rotate(5deg); }
        100% { transform: scale(1) rotate(0deg); }
    }
</style>
</head>

<body style="background-color: rgb(255,238,140); font-family: sans-serif;">

<div style="text-align: center;">

    <h1 style="color:rgb(255,238,140);
    background-color:black;
    font-size:300%;
    border-radius: 5px;
    display: inline-block; 
    padding: 0px 20px;
    margin-bottom: 10px">
    bee &#9829;
    </h1>

    <div style="text-align: center;">
        <p style ="color:white;
        font-weight: bold;
        background-color:black;
        display: inline-block; 
        padding: 5px 5px;
        margin-bottom: 5px;
        border-radius: 5px;">
        bee appreciation post
        </p>
    </div>

    <div style="text-align: center;">
        <p style="background-color: black; 
        color: white; display: inline-block; 
        padding: 5px 10px; 
        font-weight: bold; 
        border-radius: 5px;">
            squishes: <span id="squeakCount">0</span>
        </p>
    </div>

</div>

<img id="beeImage" src="https://pngimg.com/uploads/bee/bee_PNG74690.png" alt="transparent png of a bee" style="display: block; margin-left: auto; margin-right: auto; width: 50%; cursor: pointer;">

<audio id="beeSound" src="squeak.mp3" preload="auto"></audio>

<script>
    const bee = document.getElementById('beeImage');
    const sound = document.getElementById('beeSound');
    const counterDisplay = document.getElementById('squeakCount');
    
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    let count = 0;

    bee.addEventListener('click', function() {
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }

        count++;
        counterDisplay.textContent = count;

        sound.currentTime = 0;
        sound.play().catch(function(error) {
            console.log("Audio Error: " + error.message);
        });

        bee.classList.add('wiggle');
        setTimeout(function() {
            bee.classList.remove('wiggle');
        }, 200);
    });
</script>

</body>
</html>
