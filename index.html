<!DOCTYPE html>
<html>
<head>
<title>Bee Squish</title>
<style>
  
    .wiggle {
        animation: shake 0.2s;
    }
    @keyframes shake {
        0% { transform: scale(1) rotate(0deg); }
        50% { transform: scale(0.9) rotate(5deg); }
        100% { transform: scale(1) rotate(0deg); }
    }
</style>
</head>

<body style="background-color: rgb(255,238,140);">

<div style="text-align: center;">

<h1 style="color:rgb(255,238,140);
background-color:black;
font-size:300%;
display: inline-block; 
padding: 0px 20px;
margin-bottom: 10px"
>
bee &#9829;
</h1>

<div style="text-align: center;">

<p style ="color:white;
background-color:black;
display: inline-block; 
padding: 5px 5px;
margin-top: -175px">
bee appreciation post
</p>

</div>

<img id="beeImage" src="https://pngimg.com/uploads/bee/bee_PNG74690.png" alt="transparent png of a bee" style="display: block; margin-left: auto; margin-right: auto; width: 50%; cursor: pointer;">

<audio id="beeSound" src="Squeaky Toy Sound Effect.mp3"></audio>

<script>
    const bee = document.getElementById('beeImage');
    const sound = document.getElementById('beeSound');

    bee.addEventListener('click', function() {
        sound.currentTime = 0;
        sound.play().catch(function(error) {
            console.log("Audio file not found. Check the filename!");
        });

        bee.classList.add('wiggle');

        setTimeout(function() {
            bee.classList.remove('wiggle');
        }, 200);
    });
</script>

</body>
</html>
